name: Deploy

env:
  MC_VERSION: 1.21.1

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: Publish target
        required: true
        type: choice
        options:
          - curseforge
          - modrinth

permissions:
  contents: write

jobs:
  version_check:
    runs-on: ubuntu-latest
    outputs:
      current: ${{ steps.version.outputs.current }}
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version changed
        id: version
        shell: bash
        run: |
          current=$(node -p "require('./package.json').version")
          previous=$(git show origin/main:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version" || true)
          echo "current=$current" >> "$GITHUB_OUTPUT"
          if [ -n "$previous" ] && [ "$current" = "$previous" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: version_check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: resourcepack-zip
          path: dist/*.zip
          if-no-files-found: error

  publish_curseforge:
    needs: [version_check, build]
    if: github.event_name == 'push' && needs.version_check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: resourcepack-zip
          path: dist
      - name: Publish to CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: dist/*.zip
          name: AE2 GUI Light v${{ needs.version_check.outputs.current }}
          version: ${{ needs.version_check.outputs.current }}
          version-type: release
          changelog: Automated build from GitHub Actions
          loaders: fabric
          game-versions: 1.21.1
          java: 21

  publish_modrinth:
    needs: [version_check, build]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'modrinth'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: resourcepack-zip
          path: dist
      - name: Publish to Modrinth
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
          VERSION: ${{ needs.version_check.outputs.current }}
        run: |
          set -euo pipefail
          zip_file=$(find dist -maxdepth 1 -name '*.zip' -print -quit)
          if [ -z "$zip_file" ]; then
            echo "No zip artifact found in dist/"
            exit 1
          fi
          payload=$(cat <<JSON
          {
            "name": "AE2 GUI Light v${VERSION}",
            "version_number": "${VERSION}",
            "changelog": "Automated build from GitHub Actions",
            "dependencies": [],
            "game_versions": ["1.21.1"],
            "version_type": "release",
            "loaders": ["minecraft"],
            "featured": true,
            "status": "listed",
            "requested_status": "listed",
            "project_id": "${MODRINTH_PROJECT_ID}",
            "file_parts": ["file"],
            "primary_file": "file"
          }
          JSON
          )
          curl -fsS -X POST "https://api.modrinth.com/v2/version" \
            -H "Authorization: $MODRINTH_TOKEN" \
            -F "data=$payload;type=application/json" \
            -F "file=@${zip_file};type=application/zip"
